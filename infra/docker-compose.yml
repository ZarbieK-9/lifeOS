services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lifeos
      POSTGRES_USER: lifeos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lifeos_dev}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeos"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      - "1883:1883"
      - "9001:9001"
    entrypoint: >
      sh -c '
        if [ ! -f /mosquitto/config/password_file ] || [ $$(wc -c < /mosquitto/config/password_file) -lt 50 ]; then
          touch /mosquitto/config/password_file &&
          mosquitto_passwd -b /mosquitto/config/password_file lifeos_server lifeos_server_pass &&
          mosquitto_passwd -b /mosquitto/config/password_file lifeos_user1 lifeos_user1_pass &&
          mosquitto_passwd -b /mosquitto/config/password_file lifeos_user2 lifeos_user2_pass;
        fi &&
        exec mosquitto -c /mosquitto/config/mosquitto.conf
      '
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 -u lifeos_server -P lifeos_server_pass 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # gRPC Backend
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://lifeos:${POSTGRES_PASSWORD:-lifeos_dev}@postgres:5432/lifeos
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "30"
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: "1883"
      MQTT_USERNAME: lifeos_server
      MQTT_PASSWORD: lifeos_server_pass
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
    volumes:
      - proto_descriptor:/app/shared
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    # Copy proto descriptor to shared volume on start
    entrypoint: >
      sh -c '
        cp /app/proto.pb /app/shared/proto.pb &&
        python -m app.server
      '

  # OAuth redirect — Google redirects here; we redirect to lifeos:// so the app can complete sign-in
  oauth_redirect:
    image: python:3.12-alpine
    restart: unless-stopped
    working_dir: /app
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    volumes:
      - ./oauth_redirect:/app:ro
    command: ["python3", "/app/oauth_redirect.py"]
    expose:
      - "3090"

  # Envoy — gRPC-JSON transcoder proxy + routes /oauth/ to oauth_redirect
  envoy:
    image: envoyproxy/envoy:v1.31-latest
    restart: unless-stopped
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
      - proto_descriptor:/etc/envoy/descriptors:ro
    ports:
      - "8080:8080"
      - "9901:9901"
    depends_on:
      - backend
      - oauth_redirect
    entrypoint: >
      sh -c '
        echo "Waiting for proto descriptor..." &&
        until [ -f /etc/envoy/descriptors/proto.pb ]; do sleep 1; done &&
        cp /etc/envoy/descriptors/proto.pb /etc/envoy/proto.pb &&
        envoy -c /etc/envoy/envoy.yaml
      '

volumes:
  pg_data:
  mosquitto_data:
  mosquitto_log:
  proto_descriptor:
