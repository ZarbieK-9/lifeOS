# Eclipse Mosquitto — LifeOS self-hosted MQTT broker

# TCP listener for backend service
listener 1883
protocol mqtt

# WebSocket listener for mobile clients
listener 9001
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice

# Authentication
allow_anonymous false
password_file /mosquitto/config/password_file

# Performance (personal use)
max_inflight_messages 20
max_queued_messages 1000
max_connections 10
