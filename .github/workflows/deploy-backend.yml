# Same pattern as pocketbridge-backend: self-hosted runner on zarbie-server pulls
# a fixed clone path, builds, migrates, then restarts PM2 via systemd.
#
# One-time: add this repository to the existing self-hosted runner
# (GitHub → repo Settings → Actions → Runners → your runner → add repository).
#
# Default clone: git clone git@github.com:ZarbieK-9/lifeOS.git ~/Downloads/lifeOS

name: Deploy LifeOS backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy on runner (pull, codegen, migrate, restart PM2)
        run: |
          set -euo pipefail
          REPO_ROOT="${LIFEOS_REPO_ROOT:-/home/zarbie/Downloads/lifeOS}"
          cd "$REPO_ROOT"
          git fetch origin main
          git reset --hard origin/main
          cd backend
          [ -d .venv ] || python3 -m venv .venv
          .venv/bin/pip install -q -r requirements.txt
          chmod +x generate.sh 2>/dev/null || true
          export PATH="$PWD/.venv/bin:$PATH"
          ./generate.sh
          set -a
          if [ -f .env ]; then
            # shellcheck disable=SC1091
            . ./.env
          fi
          set +a
          .venv/bin/alembic upgrade head
          sudo systemctl restart pm2-zarbie.service
