# Runs on GitHub-hosted ubuntu-latest and SSHs into your server.
#
# Why: your self-hosted runner is registered only for pocketbridge-backend
# (see actions-runner/.runner → gitHubUrl), so lifeOS "Deploy" jobs stay queued.
#
# Add repository secrets: Settings → Secrets and variables → Actions
#   DEPLOY_HOST      — server hostname or IP (public or Tailscale DNS)
#   DEPLOY_USER      — SSH login (e.g. zarbie)
#   DEPLOY_SSH_KEY   — private key PEM (the whole key, with BEGIN/END lines)
#
# Server needs: clone at /home/zarbie/Downloads/lifeOS, git auth to pull,
# passwordless sudo for: systemctl restart pm2-zarbie.service

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "${DEPLOY_HOST:-}" && test -n "${DEPLOY_USER:-}" && test -n "${DEPLOY_SSH_KEY:-}" || {
            echo "Missing DEPLOY_HOST, DEPLOY_USER, or DEPLOY_SSH_KEY repository secrets."
            exit 1
          }
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/lifeos_deploy
          chmod 600 ~/.ssh/lifeos_deploy
          ssh -i ~/.ssh/lifeos_deploy \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            'bash -s' << 'REMOTE_SCRIPT'
          set -euo pipefail
          cd /home/zarbie/Downloads/lifeOS
          git fetch origin main
          git reset --hard origin/main
          chmod +x scripts/deploy-lifeos-backend.sh
          exec bash scripts/deploy-lifeos-backend.sh
          REMOTE_SCRIPT
